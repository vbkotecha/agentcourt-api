version: "3.9"

services:
  agentcourt:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - AGENTCOURT_DATA_DIR=/data
    volumes:
      - agentcourt_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  agentcourt_data:
