version: "3.9"

services:
  agentcourt:
    build: .
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      # Optional: enable x402 payments
      # - X402_ENABLED=true
      # - X402_FACILITATOR_URL=https://x402.org/facilitate
      # - X402_PRICE=0.05
      # - X402_CURRENCY=USDC
      # - X402_CHAIN=base
      # - PAYMENT_WALLET=0xYourWalletAddress
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
