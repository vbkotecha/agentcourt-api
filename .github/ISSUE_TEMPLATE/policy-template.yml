name: Policy Template Contribution
description: Contribute a new dispute resolution policy template
title: "[Policy] <template-name>"
labels: ["policy-template", "contribution"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for contributing a dispute resolution policy template!
        Please fill out the sections below.
  - type: input
    id: name
    attributes:
      label: Template Name
      description: Short kebab-case name (e.g., data-provenance, nft-authenticity)
    validations:
      required: true
  - type: input
    id: domain
    attributes:
      label: Dispute Domain
      description: What type of transactions does this cover?
    validations:
      required: true
  - type: textarea
    id: rules
    attributes:
      label: Rules
      description: Each rule with condition, remedy, and confidence
      value: |
        Rule 1: <rule-name>
          Condition: <python-style boolean expression on facts>
          Remedy: <full_refund | partial_refund | full_payout | deny_payout | service_credit | escalate>
          Confidence: <high | medium | low>
    validations:
      required: true
  - type: textarea
    id: metadata
    attributes:
      label: Metadata Fields
      description: Structured metadata callers should provide
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Example Dispute
      description: A minimal dispute payload that triggers a non-default ruling
    validations:
      required: true
