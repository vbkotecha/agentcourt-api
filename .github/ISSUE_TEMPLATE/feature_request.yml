name: Feature Request
description: Suggest a new feature or integration
title: "[Feature] <description>"
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Feature Description
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New policy template
        - SDK (Python/JS/TS)
        - API endpoint
        - MCP integration
        - x402 payment
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: What agent commerce problem does this solve?
    validations:
      required: true
